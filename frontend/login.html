<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • CycleFlex</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-box">
    <h1 style="margin-bottom:18px;">Login</h1>
    <div id="loginMsg" class="message"></div>
    <form id="loginForm">
      <input id="loginEmail" class="input" type="email" placeholder="Email" required />
      <input id="loginPassword" class="input" type="password" placeholder="Password" required />
      <button class="btn" type="submit">Login</button>
    </form>
    <p style="margin-top:14px;" class="muted">New user? <a href="signup.html">Create account</a></p>
    <p style="margin-top:14px;" class="muted">Demo user: customer@cycleflex.com / Cycleflex@123</p>
    <p class="muted">Admin: admin@cycleflex.com / Admin@123</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
