<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout • CycleFlex</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="checkout-box">
    <h1 style="margin-bottom:18px;">Checkout</h1>
    <div id="checkoutMsg" class="message"></div>
    <form id="checkoutForm">
      <input id="fullName" class="input" placeholder="Full name" required />
      <input id="phone" class="input" placeholder="Phone number" required />
      <textarea id="address" class="input" placeholder="Address" required></textarea>
      <input id="city" class="input" placeholder="City" required />
      <input id="state" class="input" placeholder="State" required />
      <input id="pincode" class="input" placeholder="Pincode" required />
      <select id="paymentMethod" class="select">
        <option value="COD">Cash on Delivery</option>
        <option value="UPI">UPI</option>
        <option value="Card">Card</option>
      </select>
      <button type="submit" class="btn">Place Order</button>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
