<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup • CycleFlex</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-box">
    <h1 style="margin-bottom:18px;">Create Account</h1>
    <div id="signupMsg" class="message"></div>
    <form id="signupForm">
      <input id="signupName" class="input" type="text" placeholder="Full name" required />
      <input id="signupEmail" class="input" type="email" placeholder="Email" required />
      <input id="signupPassword" class="input" type="password" placeholder="Password" required />
      <button class="btn" type="submit">Signup</button>
    </form>
    <p style="margin-top:14px;" class="muted">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
